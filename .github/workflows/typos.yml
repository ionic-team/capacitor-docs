name: Typo Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  typos:
    name: Check for typos
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1.39.0
